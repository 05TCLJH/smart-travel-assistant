<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能旅游助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="assets/app-logo.svg?v=2">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/components.css?v=2">
    <link rel="stylesheet" href="css/responsive.css?v=2">
</head>
<body>
    <!-- 简洁导航栏 -->
    <header class="top-shell">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <div class="brand-logo">
                        <img src="assets/app-logo.svg?v=2" alt="">
                    </div>
                    <h1>智能旅游助手</h1>
                </div>

                <div class="nav-actions">
                    <div class="nav-mode-card" id="runtime-mode-badge" data-mode="demo">
                        <span class="nav-mode-dot"></span>
                        <strong id="runtime-mode-title">体验模式</strong>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- 主工作区 -->
    <main class="main-content">
        <section class="workbench-section">
            <div class="planner-workbench">
                <!-- 左侧图标导航 -->
                <aside class="workbench-rail" aria-label="工作区导航">
                    <button type="button" class="rail-btn is-active" aria-label="行程规划" title="行程规划" data-panel="planner">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7.5L12 4L20 7.5V16.5L12 20L4 16.5V7.5Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 4V20" stroke="currentColor" stroke-width="1.8"/><path d="M4 7.5L12 11L20 7.5" stroke="currentColor" stroke-width="1.8"/></svg>
                    </button>
                    <button type="button" class="rail-btn" aria-label="人物画像" title="人物画像" data-panel="persona">
                        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M5.5 18.5C6.7 15.9 9 14.6 12 14.6C15 14.6 17.3 15.9 18.5 18.5" stroke="currentColor" stroke-width="1.8"/></svg>
                    </button>
                    <button type="button" class="rail-btn" aria-label="景点识别" title="景点识别" data-panel="vision">
                        <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="12" rx="3" stroke="currentColor" stroke-width="1.8"/><circle cx="9" cy="10" r="1.6" fill="currentColor"/></svg>
                    </button>
                    <button type="button" class="rail-btn" aria-label="导出报告" title="导出报告" data-panel="export">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M12 4V14" stroke="currentColor" stroke-width="1.8"/><path d="M8.5 10.5L12 14L15.5 10.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 18.5H19" stroke="currentColor" stroke-width="1.8"/></svg>
                    </button>
                </aside>

                <!-- 左侧面板 -->
                <aside class="workspace-sidebar">
                    <!-- 行程设置面板 -->
                    <section class="sidebar-view active" data-panel-view="planner">
                        <form id="trip-form" class="sidebar-card planner-card">
                            <h3>行程设置</h3>
                            
                            <!-- 目的地（全宽） -->
                            <div class="form-group form-group-full">
                                <label for="destination">目的地</label>
                                <input type="text" id="destination" name="destination" placeholder="输入城市名称" value="南昌" required>
                            </div>

                            <!-- 日期和预算（单行） -->
                            <div class="form-row">
                                <div class="form-group flex-1">
                                    <label for="start-date">出发日期</label>
                                    <input type="date" id="start-date" name="start_date" required>
                                </div>
                                <div class="form-group flex-1">
                                    <label for="budget">预算（元）</label>
                                    <input type="number" id="budget" name="budget" min="0" step="100" value="3000" required>
                                </div>
                            </div>

                            <!-- 游玩天数（全宽） -->
                            <div class="form-group form-group-full">
                                <label for="days">游玩天数：<span id="days-value">3</span> 天</label>
                                <input type="range" id="days" name="days" min="1" max="7" value="3" oninput="updateDaysValue(this.value)">
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg">生成方案</button>
                        </form>

                        <section class="sidebar-card system-status-card" id="system-status-card">
                            <h3>系统能力</h3>
                            <p id="system-status-desc">检测中...</p>
                            <div class="capability-pills" id="stage-capability-pills"></div>
                        </section>
                    </section>

                    <!-- 人物画像面板 -->
                    <section class="sidebar-view" data-panel-view="persona">
                        <section class="sidebar-card persona-card">
                            <div class="persona-summary">
                                <div class="persona-avatar">
                                    <img src="assets/persona-avatar.svg?v=2" alt="">
                                </div>
                                <div>
                                    <h3 id="persona-name-display">旅行者</h3>
                                    <p id="persona-style-display">经典热门风格</p>
                                </div>
                            </div>

                            <form id="persona-form" class="persona-form">
                                <!-- 姓名 -->
                                <div class="form-group form-group-full">
                                    <label for="persona-name">姓名</label>
                                    <input type="text" id="persona-name" name="name" placeholder="输入您的称呼" value="旅行者">
                                </div>

                                <!-- 旅行风格 -->
                                <div class="form-group form-group-full">
                                    <label for="persona-style">旅行风格</label>
                                    <select id="persona-style" name="travel_style">
                                        <option value="classic_hot">经典热门</option>
                                        <option value="offbeat">小众探索</option>
                                        <option value="leisure">休闲度假</option>
                                        <option value="adventure">户外探险</option>
                                        <option value="cultural">文化深度游</option>
                                    </select>
                                </div>

                                <!-- 体力水平 -->
                                <div class="form-group form-group-full">
                                    <label>体力水平：<span id="energy-value">中等</span></label>
                                    <input type="range" id="persona-energy" name="energy_level" min="1" max="5" value="3" oninput="updateEnergyValue(this.value)">
                                    <div class="range-labels">
                                        <span>轻松</span>
                                        <span>充沛</span>
                                    </div>
                                </div>

                                <!-- 预算偏好 -->
                                <div class="form-group form-group-full">
                                    <label for="persona-budget-preference">预算偏好</label>
                                    <select id="persona-budget-preference" name="budget_preference">
                                        <option value="economy">经济实惠</option>
                                        <option value="balanced" selected>平衡适中</option>
                                        <option value="comfort">舒适优先</option>
                                        <option value="luxury">豪华享受</option>
                                    </select>
                                </div>

                                <!-- 特殊需求 -->
                                <div class="form-group form-group-full">
                                    <label for="persona-notes">特殊需求（可选）</label>
                                    <textarea id="persona-notes" name="notes" rows="2" placeholder="如：无障碍需求、饮食禁忌等"></textarea>
                                </div>
                            </form>

                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" id="reset-persona-btn">重置</button>
                                <button type="submit" form="persona-form" class="btn btn-primary">保存</button>
                            </div>
                        </section>
                    </section>

                    <!-- 景点识别面板 -->
                    <section class="sidebar-view" data-panel-view="vision">
                        <section class="sidebar-card vision-card">
                            <h3>景点识别</h3>
                            <div class="upload-area" id="upload-area">
                                <input type="file" id="image-upload" accept="image/*" class="file-input">
                                <div class="upload-content">
                                    <span class="upload-icon">📷</span>
                                    <p>点击或拖拽上传图片</p>
                                </div>
                            </div>
                        </section>
                    </section>

                    <!-- 导出面板 -->
                    <section class="sidebar-view" data-panel-view="export">
                        <section class="sidebar-card export-card">
                            <h3>导出报告</h3>
                            <p>生成 PDF 格式的旅行方案报告</p>
                            <button type="button" class="btn btn-primary btn-lg" id="export-pdf-btn">生成 PDF</button>
                        </section>
                    </section>
                </aside>

                <!-- 右侧结果展示区 -->
                <section class="workspace-stage">
                    <div class="stage-topbar">
                        <div class="stage-topbar-brand">
                            <img src="assets/brand-mark.svg?v=2" alt="">
                            <div>
                                <strong>结果预览</strong>
                                <span id="result-status">等待生成</span>
                            </div>
                        </div>
                        <div class="stage-topbar-actions">
                            <span class="stage-pill is-muted" id="stage-mode-pill">体验模式</span>
                        </div>
                    </div>

                    <div class="stage-body" id="stage-body">
                        <!-- 空状态 -->
                        <div class="empty-stage" id="empty-stage">
                            <div class="empty-stage-hero">
                                <div class="empty-stage-panel empty-stage-panel-main">
                                    <span class="empty-stage-badge">Ready</span>
                                    <h4>开始您的旅程</h4>
                                    <p>填写左侧表单，点击"生成方案"按钮</p>
                                    <div class="empty-stage-tags">
                                        <span>智能规划</span>
                                        <span>实时天气</span>
                                        <span>预算分析</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 结果区域（初始隐藏） -->
                        <div class="result-section" id="result-section" style="display: none;">
                            <div class="stage-header">
                                <h3 id="result-title">旅行方案</h3>
                                <p id="result-subtitle">已为您生成个性化行程</p>
                            </div>

                            <div class="stage-overview-grid" id="stage-overview-grid">
                                <!-- 动态内容 -->
                            </div>

                            <div class="stage-sections" id="stage-sections">
                                <!-- 每日行程、天气、预算等 -->
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="js/api.js?v=2"></script>
    <script src="js/utils/helpers.js?v=2"></script>
    <script src="js/utils/state.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
